<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- Gavel handle -->
  <rect x="30" y="34" width="8" height="20" rx="3" transform="rotate(-45 34 44)" fill="url(#hammer)"/>
  <!-- Gavel head -->
  <rect x="14" y="12" width="28" height="14" rx="4" transform="rotate(-45 28 19)" fill="white"/>
  <!-- Strike lines -->
  <line x1="46" y1="8" x2="52" y2="14" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="12" x2="56" y2="8" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
